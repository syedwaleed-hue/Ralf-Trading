kind = "web"
previewPath = "/"
title = "RALF Trading"
version = "1.0.0"
id = "artifacts/ralf-trading"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20351

[services.development]
run = "pnpm --filter @workspace/ralf-trading run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ralf-trading", "run", "build" ]
serve = "static"
publicDir = "artifacts/ralf-trading/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20351"
BASE_PATH = "/"
